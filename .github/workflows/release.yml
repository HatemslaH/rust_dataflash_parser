name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            suffix: linux-x86_64
            bin: rust_dataflash_parser
            archive: rust_dataflash_parser-linux-x86_64.tar.gz
          - runner: windows-latest
            suffix: windows-x86_64
            bin: rust_dataflash_parser.exe
            archive: rust_dataflash_parser-windows-x86_64.zip
          - runner: macos-latest
            suffix: macos-arm64
            bin: rust_dataflash_parser
            archive: rust_dataflash_parser-macos-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf "${{ matrix.archive }}" -C target/release "${{ matrix.bin }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/release/${{ matrix.bin }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  build-viewer:
    name: Build Viewer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: viewer/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: viewer

      - name: Build
        run: pnpm run build
        working-directory: viewer

      - name: Package Viewer
        run: cd viewer && zip -r ../uav-log-viewer.zip dist

      - name: Upload Viewer artifact
        uses: actions/upload-artifact@v4
        with:
          name: uav-log-viewer.zip
          path: uav-log-viewer.zip

  release:
    name: Publish GitHub Release
    needs: [build, build-viewer]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: dist/*
